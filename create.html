  <title>ResumeAI — Create Resume</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }

    :root{
      --bg:#0b0f19;
      --panel: rgba(255,255,255,.035);
      --panel2: rgba(255,255,255,.02);
      --border: rgba(255,255,255,.10);
      --text:#e5e7eb;
      --muted:#9ca3af;
      --muted2:#94a3b8;
      --input:#111827;
      --accent1:#7b5cff;
      --accent2:#5b3dff;
      --ok:#22c55e;
      --danger:#ef4444;
    }

    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Arial;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(123,92,255,.18), transparent 60%),
                  radial-gradient(900px 500px at 90% 10%, rgba(91,61,255,.14), transparent 55%),
                  var(--bg);
      color: var(--text);
    }

    .wrap{ max-width: 980px; margin: auto; padding: 42px 18px; }

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; flex-wrap:wrap; margin-bottom: 14px;
    }

    a.link{ color:#a5b4fc; text-decoration:none; font-weight:700; }
    a.link:hover{ text-decoration:underline; }

    .brand{
      font-weight:900; letter-spacing:-.02em;
      display:flex; align-items:center; gap:10px;
    }
    .brand .dot{
      width:12px; height:12px; border-radius:99px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow: 0 0 0 6px rgba(123,92,255,.18);
    }
    .brand span{ color:#c7d2fe; font-weight:900; }

    .pill{
      display:inline-flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(8px);
    }

    select, input, textarea{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: var(--input);
      color: var(--text);
      outline:none;
    }
    textarea{ resize: vertical; min-height: 110px; }
    input:focus, textarea:focus, select:focus{
      border-color: rgba(123,92,255,.55);
      box-shadow: 0 0 0 4px rgba(123,92,255,.10);
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-top: 14px;
    }

    .headerRow{
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:14px; flex-wrap:wrap;
    }

    h1{
      margin: 6px 0 6px 0;
      font-size: 40px;
      letter-spacing:-.03em;
      line-height:1.08;
    }

    .muted{ color: var(--muted); font-size: 13px; line-height: 1.55; }
    .muted2{ color: var(--muted2); font-size: 13px; line-height: 1.55; }

    .progressWrap{
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(17,24,39,.55);
    }
    .progressTop{
      display:flex; justify-content:space-between; align-items:center;
      gap:12px; flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .stepTitle{
      font-weight:900;
      letter-spacing:-.01em;
    }
    .stepCount{ color: rgba(255,255,255,.7); font-size: 12px; }

    .bar{
      width:100%;
      height:10px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.10);
    }
    .bar > div{
      height:100%;
      width:0%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border-radius: 999px;
      transition: width .25s ease;
    }

    .section{
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.02);
    }

    .section h2{
      margin: 0 0 6px 0;
      font-size: 16px;
      letter-spacing:-.01em;
    }

    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    label{
      display:block;
      font-size: 12px;
      color: rgba(255,255,255,.72);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .row{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }

    .btnRow{
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      flex-wrap:wrap;
      margin-top: 14px;
    }

    button{
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
    }
    button.secondary{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.88);
      font-weight: 800;
    }
    button.ghost{
      background: transparent;
      border: 1px dashed rgba(255,255,255,.22);
      color: rgba(255,255,255,.82);
      font-weight: 800;
    }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    .hintLine{
      margin-top: 8px;
      color: rgba(255,255,255,.70);
      font-size: 12px;
    }

    .error{
      margin-top: 10px;
      color: #fecaca;
      font-size: 13px;
      font-weight: 700;
    }

    .ok{
      margin-top: 10px;
      color: #bbf7d0;
      font-size: 13px;
      font-weight: 800;
    }

    .itemCard{
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(17,24,39,.45);
    }

    .itemHead{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .itemHead .title{
      font-weight: 900;
      letter-spacing: -.01em;
      color: rgba(255,255,255,.92);
    }

    .chipBtn{
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.86);
      font-weight: 800;
      cursor: pointer;
    }

    .toggle{
      display:flex; align-items:center; gap:10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
    }
    .toggle input[type="checkbox"]{ width: 18px; height: 18px; }

    .divider{
      margin: 12px 0;
      height: 1px;
      background: rgba(255,255,255,.10);
    }

    @media(max-width:900px){
      h1{ font-size: 32px; }
      .grid2, .grid3{ grid-template-columns: 1fr; }
    }

    <div class="card">

      <div id="ok" class="ok" style="display:none;"></div>

      <div class="btnRow">

        <div class="row">

        </div>
      </div>

      <div class="hintLine" id="t_footerHint">
        Tip: You can skip optional steps and come back later.
      </div>
    </div>

  </div>

/* =========================
   Helpers
========================= */
const $ = (sel) => document.querySelector(sel);

function showMsg(text){
  const el = $("#msg");
  const ok = $("#ok");
  ok.style.display = "none";
  el.style.display = text ? "block" : "none";
  el.textContent = text || "";
}
function showOk(text){
  const el = $("#ok");
  const msg = $("#msg");
  msg.style.display = "none";
  el.style.display = text ? "block" : "none";
  el.textContent = text || "";
}

function getT(){
  return I18N[state.lang] || I18N.en;
}

function setDir(){
  document.documentElement.lang = state.lang;
  document.documentElement.dir = (state.lang === "ar") ? "rtl" : "ltr";
}

function fmtMonth(val){ // "YYYY-MM" -> "MM/YYYY"
  if(!val) return "";
  const [y,m] = String(val).split("-");
  if(!y || !m) return "";
  return `${m}/${y}`;
}

function cleanLines(v){
  return String(v || "")
    .split("\n")
    .map(x => x.trim())
    .filter(Boolean);
}

function saveToLocal(){
  localStorage.setItem("resumeai_create_state_v2", JSON.stringify(state));
}
function loadFromLocal(){
  try{
    const raw = localStorage.getItem("resumeai_create_state_v2");
    if(!raw) return;
    const j = JSON.parse(raw);
    if(j && typeof j === "object"){
      Object.assign(state, j);
    }
  }catch{}
}

/* =========================
   UI: language select
========================= */
function initLangSelect(){
  const sel = $("#lang");
  sel.innerHTML = "";
  LANGS.forEach(([code,label])=>{
    const o = document.createElement("option");
    o.value = code;
    o.textContent = label;
    sel.appendChild(o);
  });

  // default: saved lang or browser lang
  const saved = localStorage.getItem("resumeai_create_lang") || state.lang;
  state.lang = saved || "en";
  sel.value = state.lang;

  sel.addEventListener("change", ()=>{
    state.lang = sel.value;
    localStorage.setItem("resumeai_create_lang", state.lang);
    setDir();
    renderAll();
    saveToLocal();
  });
}

/* =========================
   Render: header/progress/buttons
========================= */
function renderHeaderTexts(){
  const t = getT();
  $("#t_back").textContent = t.back;
  $("#t_title").textContent = t.title;
  $("#t_sub").textContent = t.sub;
  $("#t_langLabel").textContent = t.langLabel;
  $("#t_langHint").textContent = t.langHint;
  $("#t_footerHint").textContent = t.footerHint;

  $("#btnBack").textContent = t.btnBack;
  $("#btnNext").textContent = (stepIndex === steps.length-1) ? t.btnGenerate : t.btnNext;
  $("#btnSave").textContent = t.btnSave;
}

function renderProgress(){
  const t = getT();
  const key = steps[stepIndex];
  $("#stepTitle").textContent = t.steps[key].t;
  $("#stepHelp").textContent = t.steps[key].h;
  $("#stepCount").textContent = `${stepIndex+1} / ${steps.length}`;
  const pct = Math.round(((stepIndex+1) / steps.length) * 100);
  $("#barFill").style.width = `${pct}%`;
}

/* =========================
   Components (no placeholders)
========================= */
function fieldWrap(label, inputEl){
  const w = document.createElement("div");
  const l = document.createElement("label");
  l.textContent = label;
  w.appendChild(l);
  w.appendChild(inputEl);
  return w;
}

function textInput(value, onInput, type="text"){
  const i = document.createElement("input");
  i.type = type;
  i.value = value || "";
  i.addEventListener("input", ()=> onInput(i.value));
  return i;
}

function monthInput(value, onInput){
  const i = document.createElement("input");
  i.type = "month";
  i.value = value || "";
  i.addEventListener("input", ()=> onInput(i.value));
  return i;
}

function textArea(value, onInput, minH=120){
  const ta = document.createElement("textarea");
  ta.value = value || "";
  ta.style.minHeight = `${minH}px`;
  ta.addEventListener("input", ()=> onInput(ta.value));
  return ta;
}

function addRemoveButton(onClick, text){
  const b = document.createElement("button");
  b.type = "button";
  b.className = "chipBtn";
  b.textContent = text;
  b.addEventListener("click", onClick);
  return b;
}

========================= */
function renderStepContact(container){
  const t = getT();
  const sec = document.createElement("div");
  sec.className = "section";

  const h2 = document.createElement("h2");
  h2.textContent = t.steps.contact.t;
  sec.appendChild(h2);

  const p = document.createElement("div");
  p.className = "muted";
  p.textContent = t.steps.contact.h;
  sec.appendChild(p);

  const grid = document.createElement("div");
  grid.className = "grid2";
  grid.style.marginTop = "12px";

  grid.appendChild(fieldWrap(t.fields.fullName, textInput(state.basics.fullName, v => state.basics.fullName = v)));
  grid.appendChild(fieldWrap(t.fields.headline, textInput(state.basics.title, v => state.basics.title = v)));

  grid.appendChild(fieldWrap(t.fields.location, textInput(state.basics.location, v => state.basics.location = v)));
  grid.appendChild(fieldWrap(t.fields.email, textInput(state.basics.email, v => state.basics.email = v, "email")));

  grid.appendChild(fieldWrap(t.fields.phone, textInput(state.basics.phone, v => state.basics.phone = v, "tel")));
  // empty spacer for grid symmetry
  const spacer = document.createElement("div");
  grid.appendChild(spacer);

  sec.appendChild(grid);

  // Links
  const linksSec = document.createElement("div");
  linksSec.className = "itemCard";

  const head = document.createElement("div");
  head.className = "itemHead";
  const title = document.createElement("div");
  title.className = "title";
  title.textContent = t.fields.links;
  head.appendChild(title);

  const addBtn = document.createElement("button");
  addBtn.type = "button";
  addBtn.className = "chipBtn";
  addBtn.textContent = t.fields.addLink;
  addBtn.addEventListener("click", ()=>{
    state.basics.links.push({ label:"", url:"" });
    renderAll();
  });
  head.appendChild(addBtn);
  linksSec.appendChild(head);

  const list = document.createElement("div");
  (state.basics.links || []).forEach((lnk, idx)=>{
    const row = document.createElement("div");
    row.className = "grid3";
    row.style.marginTop = "10px";

    row.appendChild(fieldWrap(t.fields.linkLabel, textInput(lnk.label, v => { state.basics.links[idx].label = v; })));
    row.appendChild(fieldWrap(t.fields.linkUrl, textInput(lnk.url, v => { state.basics.links[idx].url = v; }, "url")));

    const rmWrap = document.createElement("div");
    rmWrap.style.display = "flex";
    rmWrap.style.alignItems = "end";
    const rm = addRemoveButton(()=>{
      state.basics.links.splice(idx,1);
      renderAll();
    }, t.fields.remove);
    rmWrap.appendChild(rm);
    row.appendChild(rmWrap);

    list.appendChild(row);
  });

  if(!state.basics.links.length){
    const empty = document.createElement("div");
    empty.className = "muted";
    empty.style.marginTop = "8px";
    empty.textContent = " ";
    list.appendChild(empty);
  }

  linksSec.appendChild(list);
  sec.appendChild(linksSec);

  container.appendChild(sec);
}

    bw.appendChild(bl);
    bw.appendChild(textArea((pr.bullets||[]).join("\n"), v => state.projects[idx].bullets = cleanLines(v), 120));
    card.appendChild(bw);

    projCard.appendChild(card);
  });

  // Certificates
  const certCard = document.createElement("div");
  certCard.className = "itemCard";
  const ch = document.createElement("div");
  ch.className = "itemHead";
  const ct = document.createElement("div");
  ct.className = "title";
  ct.textContent = t.certificatesTitle;
  ch.appendChild(ct);
  certCard.appendChild(ch);

  const certLabel = document.createElement("label");
  certLabel.textContent = t.fields.certs;
  certCard.appendChild(certLabel);
  certCard.appendChild(textArea((state.certificates||[]).join("\n"), v => state.certificates = cleanLines(v), 120));

  // Languages
  const langCard = document.createElement("div");
  langCard.className = "itemCard";
  const lh = document.createElement("div");
  lh.className = "itemHead";
  const lt = document.createElement("div");
  lt.className = "title";
  lt.textContent = t.languagesTitle;
  lh.appendChild(lt);
  const addL = document.createElement("button");
  addL.type="button"; addL.className="chipBtn"; addL.textContent = t.fields.addLanguage;
  addL.addEventListener("click", ()=>{
    state.languages.push({ name:"", level:"" });
    renderAll();
  });
  lh.appendChild(addL);
  langCard.appendChild(lh);

  (state.languages || []).forEach((ln, idx)=>{
    const g = document.createElement("div");
    g.className = "grid3";
    g.style.marginTop = "10px";
    g.appendChild(fieldWrap(t.fields.langName, textInput(ln.name, v => state.languages[idx].name = v)));
    g.appendChild(fieldWrap(t.fields.langLevel, textInput(ln.level, v => state.languages[idx].level = v)));
    const rmWrap = document.createElement("div");
    rmWrap.style.display="flex";
    rmWrap.style.alignItems="end";
    rmWrap.appendChild(addRemoveButton(()=>{
      state.languages.splice(idx,1);
      renderAll();
    }, t.fields.remove));
    g.appendChild(rmWrap);
    langCard.appendChild(g);
  });

  sec.appendChild(projCard);
  sec.appendChild(certCard);
  sec.appendChild(langCard);

  container.appendChild(sec);
}

function renderStepReview(container){
  const t = getT();
  const sec = document.createElement("div");
  sec.className = "section";

  const h2 = document.createElement("h2");
  h2.textContent = t.fields.reviewTitle;
  sec.appendChild(h2);

  const p = document.createElement("div");
  p.className = "muted";
  p.textContent = t.fields.reviewHelp;
  sec.appendChild(p);

  const note = document.createElement("div");
  note.className = "hintLine";
  note.textContent = t.fields.exportNote;
  sec.appendChild(note);

  // Simple summary (no placeholders)
  const box = document.createElement("div");
  box.className = "itemCard";
  box.style.marginTop = "12px";

  const lines = [];
  lines.push(`• ${t.steps.contact.t}: ${state.basics.fullName ? "✓" : "—"}`);
  lines.push(`• ${t.steps.skills.t}: ${(state.skills||[]).length ? (state.skills.length + " ✓") : "—"}`);
  lines.push(`• ${t.steps.experience.t}: ${(state.experience||[]).length ? (state.experience.length + " ✓") : "—"}`);
  lines.push(`• ${t.steps.education.t}: ${(state.education||[]).length ? (state.education.length + " ✓") : "—"}`);
  lines.push(`• ${t.steps.extras.t}: ${((state.projects||[]).length + (state.certificates||[]).length + (state.languages||[]).length) ? "✓" : "—"}`);

  const pre = document.createElement("pre");
  pre.style.whiteSpace = "pre-wrap";
  pre.style.margin = "0";
  pre.style.padding = "0";
  pre.style.border = "0";
  pre.style.background = "transparent";
  pre.style.color = "rgba(255,255,255,.85)";
  pre.style.fontFamily = "inherit";
  pre.style.fontSize = "13px";
  pre.textContent = lines.join("\n");
  box.appendChild(pre);

  sec.appendChild(box);
  container.appendChild(sec);
}

/* =========================
   Render router
========================= */
function renderStep(){
  const container = $("#stepContainer");
  container.innerHTML = "";
  const key = steps[stepIndex];
  if(key === "contact") return renderStepContact(container);
  if(key === "summary") return renderStepSummary(container);
  if(key === "skills") return renderStepSkills(container);
  if(key === "experience") return renderStepExperience(container);
  if(key === "education") return renderStepEducation(container);
  if(key === "extras") return renderStepExtras(container);
  if(key === "review") return renderStepReview(container);
}

/* =========================
   Validation
========================= */
function validateStep(){
  const t = getT();
  const key = steps[stepIndex];

  // Required only on some steps
  if(key === "contact"){
    if(!state.basics.fullName.trim()) return t.required;
  }

  if(key === "experience"){
    // If user added any job blocks, require jobTitle+company for each filled block.
    for(const j of (state.experience||[])){
      const any = (j.position||j.company||j.start||j.end||j.location||((j.bullets||[]).length));
      if(any && (!String(j.position||"").trim() || !String(j.company||"").trim())){
        return t.required;
      }
    }
  }

  if(key === "education"){
    for(const e of (state.education||[])){
      const any = (e.school||e.degree||e.start||e.end);
      if(any && !String(e.school||"").trim()){
        return t.required;
      }
    }
  }

  if(key === "extras"){
    for(const p of (state.projects||[])){
      const any = (p.name||p.tech||((p.bullets||[]).length));
      if(any && !String(p.name||"").trim()){
        return t.required;
      }
    }
  }

  return "";
}

/* =========================
   Build resumeai_cvdata + export
========================= */
function buildCvData(){
  const lang = state.lang;

  const basics = {
    fullName: state.basics.fullName.trim() || "Your Name",
    title: state.basics.title.trim() || "",
    location: state.basics.location.trim() || "",
    phone: state.basics.phone.trim() || "",
    email: state.basics.email.trim() || "",
    links: (state.basics.links || [])
      .map(x => ({ label: String(x.label||"").trim(), url: String(x.url||"").trim() }))
      .filter(x => x.url),
    photoUrl: ""
  };

  const summary = String(state.summary || "").trim();

  const skills = (state.skills || [])
    .map(s => String(s).trim())
    .filter(Boolean)
    .slice(0, 40)
    .map(name => ({ name, level:"" }));

  const experience = (state.experience || [])
    .filter(j => String(j.company||"").trim() || String(j.position||"").trim())
    .slice(0, 10)
    .map(j => ({
      company: String(j.company||"").trim(),
      position: String(j.position||"").trim(),
      start: fmtMonth(j.start),
      end: j.current ? null : (fmtMonth(j.end) || null),
      location: String(j.location||"").trim(),
      highlights: (j.bullets || []).map(x => String(x).trim()).filter(Boolean).slice(0, 10)
    }));

  const education = (state.education || [])
    .filter(e => String(e.school||"").trim() || String(e.degree||"").trim())
    .slice(0, 10)
    .map(e => ({
      school: String(e.school||"").trim(),
      degree: String(e.degree||"").trim(),
      start: fmtMonth(e.start),
      end: fmtMonth(e.end)
    }));

  const projects = (state.projects || [])
    .filter(p => String(p.name||"").trim())
    .slice(0, 8)
    .map(p => ({
      name: String(p.name||"").trim(),
      tech: String(p.tech||"").split(",").map(x => x.trim()).filter(Boolean).slice(0, 12),
      highlights: (p.bullets || []).map(x => String(x).trim()).filter(Boolean).slice(0, 10)
    }));

  const certificates = (state.certificates || []).map(x => String(x).trim()).filter(Boolean).slice(0, 20);

  const languages = (state.languages || [])
    .map(l => ({ name: String(l.name||"").trim(), level: String(l.level||"").trim() }))
    .filter(l => l.name)
    .slice(0, 10);

  return {
    basics,
    summary,
    skills,
    experience,
    projects,
    education,
    certificates,
    languages,
    meta: { accent:"#6366F1", includePhoto:false, lang }
  };
}

function exportCv(){
  const t = getT();
  const cv_data = buildCvData();
  localStorage.setItem("resumeai_cvdata", JSON.stringify(cv_data));
  showOk(t.open);

  // ATS mode
  window.location.href = `/cv.html?lang=${encodeURIComponent(state.lang)}#mode=ats`;
}

/* =========================
   Navigation
========================= */
function goStep(nextIndex){
  stepIndex = Math.max(0, Math.min(steps.length-1, nextIndex));
  showMsg("");
  showOk("");
  renderAll();
  saveToLocal();
}

function onNext(){
  const t = getT();

  // validate current
  const err = validateStep();
  if(err){
    showMsg(err);
    return;
  }

  // last step => export
  if(stepIndex === steps.length - 1){
    exportCv();
    return;
  }

  goStep(stepIndex + 1);
}

function onBack(){
  if(stepIndex === 0) return;
  goStep(stepIndex - 1);
}

function onSave(){
  const t = getT();
  showMsg("");
  showOk(t.saving);
  saveToLocal();
  setTimeout(()=> showOk(t.saved), 250);
}

/* =========================
   Render all
========================= */
function renderAll(){
  setDir();
  renderHeaderTexts();
  renderProgress();
  renderStep();

  $("#btnBack").disabled = (stepIndex === 0);
  $("#btnNext").textContent = (stepIndex === steps.length-1) ? getT().btnGenerate : getT().btnNext;
}

/* =========================
   Init
========================= */
(function init(){
  loadFromLocal();

  // Apply saved language (separate key for UI)
  const savedLang = localStorage.getItem("resumeai_create_lang");
  if(savedLang) state.lang = savedLang;

  initLangSelect();
  setDir();

  $("#btnBack").addEventListener("click", onBack);
  $("#btnNext").addEventListener("click", onNext);
  $("#btnSave").addEventListener("click", onSave);

  renderAll();
})();
</script>
